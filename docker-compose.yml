services:
  db:
    image: postgres:16-alpine
    container_name: dapur-ceu-el-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dapur_ceu_el}
      POSTGRES_USER: ${POSTGRES_USER:-dapur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dapur}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dapur} -d ${POSTGRES_DB:-dapur_ceu_el}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dapur-ceu-el-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dapur:dapur@db:5432/dapur_ceu_el}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
    container_name: dapur-ceu-el-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:

